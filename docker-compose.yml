version: '3.8'

services:
  brt_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brt_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - app-network

  brt_webserver:
    image: nginx:alpine
    container_name: brt_webserver
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # <-- PERBAIKAN: Nama file diganti ke nginx.conf
    networks:
      - app-network

networks:
  app-network:
    external: true
